name: Build Linux agent

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: agent-linux-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Test
        run: go test ./...

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            out_suffix: amd64
          - goarch: arm64
            out_suffix: arm64
          - goarch: "386"
            out_suffix: i386
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Build static binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          RELEASE_DATE=$(date -u +%Y-%m-%d)
          VP="github.com/ghostpsy/agent-linux/internal/version"
          mkdir -p dist
          OUT="dist/ghostpsy_${VERSION}_linux_${{ matrix.out_suffix }}"
          go build -trimpath -ldflags="-s -w -X ${VP}.Version=${VERSION} -X ${VP}.ReleaseDate=${RELEASE_DATE}" -o "$OUT" ./cmd/ghostpsy
      - name: Verify static binary (amd64)
        if: matrix.goarch == 'amd64'
        run: |
          BIN=$(ls dist/ghostpsy_*_linux_amd64)
          ldd "$BIN" 2>&1 | tee /tmp/ldd.out
          grep -q "not a dynamic executable" /tmp/ldd.out
      - uses: actions/upload-artifact@v7.0.0
        with:
          name: ghostpsy-linux-${{ matrix.out_suffix }}
          path: dist/ghostpsy_*

  checksums:
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v6.0.0
        with:
          pattern: ghostpsy-linux-*
          path: dist
          merge-multiple: true
      - name: SHA256SUMS
        run: |
          cd dist && sha256sum ghostpsy_* | tee SHA256SUMS
      - uses: actions/upload-artifact@v7.0.0
        with:
          name: SHA256SUMS
          path: dist/SHA256SUMS
